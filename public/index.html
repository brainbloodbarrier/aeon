<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Fim — AEON</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>🥃</text></svg>">

  <!-- Typography: VT323 (terminal) · Cormorant Garamond (literary) · Share Tech Mono (cyber) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════
       AEON · O Fim — Tropicália Noir
       ═══════════════════════════════════════ */

    :root {
      --bg-void: #08070d;
      --bg-panel: rgba(10, 9, 16, 0.92);
      --amber-warm: #D4A574;
      --amber-hot: #E8956A;
      --neon-red: #FF3333;
      --neon-purple: #8B5CF6;
      --neon-blue: #38BDF8;
      --text-primary: #d4d0c8;
      --text-dim: #8a8680;
      --text-ghost: #4a4640;
      --font-terminal: 'VT323', monospace;
      --font-literary: 'Cormorant Garamond', Georgia, serif;
      --font-cyber: 'Share Tech Mono', 'Courier New', monospace;
      --chat-width: 380px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--font-cyber);
      overflow: hidden;
      cursor: crosshair;
    }

    /* ─── Film grain overlay ─── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ─── Canvas ─── */
    #game {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      transition: filter 0.4s ease;
    }

    body.chat-open #game {
      filter: brightness(0.55) saturate(0.8);
    }

    /* ─── UI Layer ─── */
    #ui-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #ui-layer > * {
      pointer-events: auto;
    }

    /* ═══════════════════════════════════════
       HUD
       ═══════════════════════════════════════ */

    .hud {
      position: fixed;
      z-index: 20;
      font-family: var(--font-terminal);
      letter-spacing: 1px;
      animation: bootIn 0.8s ease-out both;
    }

    @keyframes bootIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Entropy ─── */
    #hud-entropy {
      top: 16px;
      left: 16px;
      animation-delay: 0.1s;
    }

    #hud-entropy > span:first-child {
      font-size: 13px;
      color: var(--amber-warm);
      opacity: 0.7;
      text-shadow: 0 0 12px rgba(212, 165, 116, 0.3);
    }

    .entropy-bar {
      width: 140px;
      height: 4px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 6px;
      position: relative;
    }

    .entropy-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 29%, rgba(255,255,255,0.08) 29%, rgba(255,255,255,0.08) 31%, transparent 31%),
        linear-gradient(90deg, transparent 49%, rgba(255,255,255,0.08) 49%, rgba(255,255,255,0.08) 51%, transparent 51%),
        linear-gradient(90deg, transparent 69%, rgba(255,255,255,0.08) 69%, rgba(255,255,255,0.08) 71%, transparent 71%),
        linear-gradient(90deg, transparent 89%, rgba(255,255,255,0.08) 89%, rgba(255,255,255,0.08) 91%, transparent 91%);
      z-index: 2;
      pointer-events: none;
    }

    .entropy-fill {
      height: 100%;
      width: 15%;
      background: #4ADE80;
      transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1), background-color 1s ease;
      position: relative;
      overflow: hidden;
    }

    .entropy-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { transform: translateX(-100%); }
      50% { transform: translateX(200%); }
    }

    #entropy-label {
      font-size: 11px;
      color: var(--text-ghost);
      text-transform: uppercase;
      margin-top: 4px;
      letter-spacing: 2px;
    }

    /* ─── Paranoia ─── */
    #hud-paranoia {
      top: 16px;
      right: 16px;
      font-size: 22px;
      opacity: 0.15;
      transition: opacity 1.2s ease, transform 1.2s ease;
      animation-delay: 0.3s;
      filter: drop-shadow(0 0 4px rgba(255, 50, 50, 0.3));
    }

    /* ─── Ambient ─── */
    #hud-ambient {
      bottom: 20px;
      left: 20px;
      max-width: 340px;
      font-family: var(--font-literary);
      font-style: italic;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-dim);
      opacity: 0.6;
      transition: opacity 0.8s ease;
      animation-delay: 0.5s;
    }

    #hud-ambient::before {
      content: '— ';
      opacity: 0.3;
    }

    /* ─── Arc ─── */
    #hud-arc {
      bottom: 20px;
      right: 20px;
      font-size: 12px;
      color: var(--text-ghost);
      text-transform: uppercase;
      letter-spacing: 3px;
      animation-delay: 0.7s;
    }

    /* ═══════════════════════════════════════
       PROXIMITY PROMPT
       ═══════════════════════════════════════ */

    .proximity-prompt {
      position: fixed;
      z-index: 25;
      transform: translateX(-50%);
      padding: 8px 14px;
      background: rgba(8, 7, 13, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      font-family: var(--font-cyber);
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      animation: breathe 3s ease-in-out infinite;
    }

    .proximity-prompt.hidden {
      opacity: 0;
      pointer-events: none;
      animation: none;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.85; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-2px); }
    }

    .proximity-prompt .key {
      display: inline-block;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      padding: 1px 6px 0;
      border-radius: 3px;
      font-family: var(--font-terminal);
      font-size: 14px;
      color: var(--text-primary);
      margin-right: 4px;
    }

    .proximity-prompt strong {
      color: var(--amber-warm);
      text-shadow: 0 0 10px rgba(212, 165, 116, 0.3);
    }

    /* ═══════════════════════════════════════
       CHAT PANEL
       ═══════════════════════════════════════ */

    #chat-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: var(--chat-width);
      height: 100vh;
      background: var(--bg-panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      flex-direction: column;
      z-index: 30;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s ease;
      box-shadow: -20px 0 60px rgba(0, 0, 0, 0.5);
    }

    #chat-panel.hidden {
      transform: translateX(100%);
      pointer-events: none;
      box-shadow: none;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      border-bottom: 2px solid var(--text-ghost);
      background: rgba(255, 255, 255, 0.01);
    }

    #chat-persona-name {
      font-family: var(--font-literary);
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 0.5px;
    }

    #chat-trust-badge {
      font-family: var(--font-terminal);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-ghost);
      margin-left: 10px;
    }

    #chat-close {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom: 2px solid rgba(255, 255, 255, 0.05);
      color: var(--text-ghost);
      cursor: pointer;
      padding: 2px 8px 1px;
      font-family: var(--font-terminal);
      font-size: 13px;
      border-radius: 3px;
      transition: color 0.2s, border-color 0.2s;
    }

    #chat-close:hover {
      color: var(--neon-red);
      border-color: var(--neon-red);
    }

    /* ─── Messages ─── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 100%);
    }

    .chat-msg {
      padding: 10px 14px;
      border-radius: 3px;
      max-width: 92%;
      word-wrap: break-word;
      animation: msgIn 0.3s ease-out;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-msg-user {
      align-self: flex-end;
      background: rgba(110, 110, 255, 0.06);
      border: 1px solid rgba(110, 110, 255, 0.08);
      font-family: var(--font-cyber);
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .chat-msg-persona {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.015);
      border-left: 2px solid var(--amber-warm);
      font-family: var(--font-literary);
      font-size: 15px;
      line-height: 1.7;
      letter-spacing: 0.2px;
      color: var(--text-primary);
      padding: 12px 16px;
    }

    .chat-msg-system {
      align-self: center;
      font-family: var(--font-terminal);
      font-size: 12px;
      color: var(--text-ghost);
      font-style: normal;
      letter-spacing: 1px;
    }

    .chat-typing {
      font-family: var(--font-terminal);
      font-size: 16px;
      letter-spacing: 4px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.7; }
    }

    /* ─── Input ─── */
    .chat-input-area {
      display: flex;
      padding: 14px 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      gap: 10px;
      background: rgba(0, 0, 0, 0.2);
    }

    #chat-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      font-family: var(--font-cyber);
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 3px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #chat-input:focus {
      border-color: rgba(212, 165, 116, 0.3);
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.05);
    }

    #chat-input::placeholder {
      color: var(--text-ghost);
      font-style: italic;
    }

    #chat-send {
      background: rgba(212, 165, 116, 0.08);
      border: 1px solid rgba(212, 165, 116, 0.15);
      color: var(--amber-warm);
      cursor: pointer;
      padding: 10px 16px;
      font-family: var(--font-terminal);
      font-size: 18px;
      border-radius: 3px;
      transition: background 0.2s, box-shadow 0.2s;
    }

    #chat-send:hover {
      background: rgba(212, 165, 116, 0.15);
      box-shadow: 0 0 16px rgba(212, 165, 116, 0.1);
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(212, 165, 116, 0.15);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(212, 165, 116, 0.3);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="ui-layer">
    <!-- HUD -->
    <div id="hud-entropy" class="hud">
      <span>ENTROPY</span>
      <div class="entropy-bar">
        <div id="entropy-fill" class="entropy-fill"></div>
      </div>
      <div id="entropy-label">stable</div>
    </div>

    <div id="hud-paranoia" class="hud">
      <span id="paranoia-eye">👁</span>
    </div>

    <div id="hud-ambient" class="hud">
      <span id="ambient-text">The bar hums with quiet tension...</span>
    </div>

    <div id="hud-arc" class="hud">
      <span id="arc-label">↗ rising</span>
    </div>

    <!-- Chat panel -->
    <div id="chat-panel" class="hidden">
      <div class="chat-header">
        <div>
          <span id="chat-persona-name"></span>
          <span id="chat-trust-badge"></span>
        </div>
        <button id="chat-close">ESC</button>
      </div>
      <div id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Fale..." autocomplete="off" />
        <button id="chat-send">→</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
