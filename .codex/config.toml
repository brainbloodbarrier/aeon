# ═══════════════════════════════════════════
# AEON — Codex Project Config
# ═══════════════════════════════════════════

# Model: user selects at launch time
# Reasoning: let the model think — AEON has complex pipelines
model_reasoning_effort = "high"

# Sandbox: full workspace access — needs network for Docker, PG, Neo4j, embeddings
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true
writable_roots = [
  "/Users/fax/Documents/aeon",
]

# Shell: full env passthrough for DB, Docker, Node
[shell_environment_policy]
inherit = "all"
include_only = [
  "PATH", "HOME", "SHELL", "USER", "TERM",
  "DB_PASSWORD", "NEO4J_PASSWORD",
  "EMBEDDING_API_URL",
  "NODE_ENV", "NODE_OPTIONS",
  "DOCKER_HOST",
  "LANG", "LC_*",
]

# Project docs: read full CLAUDE.md for architecture context
project_doc_max_bytes = 32000
project_doc_fallback_filenames = ["CLAUDE.md", "README.md"]

# Features: everything enabled
[features]
multi_agent = true
js_repl = true
memories = true
child_agents_md = true
codex_git_commit = true
apply_patch_freeform = true
undo = true

# ───────────────────────────────────────────
# MCP Servers — AEON infrastructure access
# ───────────────────────────────────────────
[mcp_servers.aeon-postgres]
command = "npx"
args = ["-y", "@anthropic/mcp-postgres"]
env = { DATABASE_URL = "postgresql://architect:${DB_PASSWORD}@localhost:5432/aeon_matrix" }
